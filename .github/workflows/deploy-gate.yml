name: Deploy Gate

on:
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]

jobs:
  # Gate 1: Tech Lead (code quality)
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Check PR description has context
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if [ -z "$PR_BODY" ] || [ "${#PR_BODY}" -lt 50 ]; then
            echo "::warning::PR description is empty or too short — add context for reviewers"
          fi

  # Gate 2: QA Engineer (coverage enforcement)
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - name: Enforce 97% coverage
        run: |
          # Robust JSON parsing — no fragile grep
          COVERAGE=$(node -e "const d=require('./coverage/coverage-summary.json'); console.log(d.lines.pct)")
          if [ -z "$COVERAGE" ]; then echo "::error::Could not parse coverage summary"; exit 1; fi
          if (( $(echo "$COVERAGE < 97" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 97% threshold — blocking deploy"
            exit 1
          fi
          echo "Coverage: ${COVERAGE}% ✅"

  # Gate 3: Security Architect (scan)
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Gitleaks secrets scan
        uses: goreleaser/gitleaks-action@v2
        with:
          args: "detect --no-color --redact"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for hardcoded secrets via custom patterns
        run: |
          echo "Scanning for common secret patterns in git history..."
          # Scan all branches for committed secrets
          git log --all --oneline --name-only | head -50
          # Check for common dangerous patterns in current diff
          if git diff --origin/${{ github.base_ref }} --name-only | grep -vE "\.(png|jpg|jpeg|gif|svg|ico|woff|woff2|eot|ttf|mp4|mp3|wav)$" | while read file; do
            if [[ -f "$file" ]]; then
              # Check for hardcoded secrets, API keys, tokens
              if grep -nE "(api[_-]?key|secret[_-]?key|aws[_-]?key|password|token|ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{48})" "$file" 2>/dev/null; then
                echo "::warning::Potential secret found in $file"
              fi
            fi
          done; then
            echo "::warning::Some files may contain hardcoded secrets — review above warnings"
          fi

  # Gate 4: Design Review (accessibility + brand)
  design-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check data-testid presence on interactive elements
        run: |
          # Check PR diff for TSX files missing data-testid on interactive elements
          PR_FILES=$(git diff --origin/${{ github.base_ref }} --name-only | grep -E '\.tsx$' || echo "")
          if [ -z "$PR_FILES" ]; then
            echo "No TSX files changed — design review gate passing"
            exit 0
          fi
          echo "Checking TSX files for accessibility attributes:"
          MISSING=0
          for file in $PR_FILES; do
            if [[ -f "$file" ]]; then
              HAS_INTERACTIVE=$(grep -cE "onClick|onChange|<button|<input|<a href" "$file" 2>/dev/null || echo 0)
              HAS_TESTID=$(grep -c "data-testid" "$file" 2>/dev/null || echo 0)
              if [ "$HAS_INTERACTIVE" -gt 0 ] && [ "$HAS_TESTID" -eq 0 ]; then
                echo "::warning::File $file has interactive elements but no data-testid attributes"
                MISSING=$((MISSING + 1))
              fi
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING file(s) missing data-testid on interactive elements"
          else
            echo "✅ All TSX files have proper test ids"
          fi

  # Gate 5: Smoke Test (replaces release-manager manual check)
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test script
        run: |
          bash scripts/smoke-test.sh https://preview.familytv.vercel.app || \
          bash scripts/smoke-test.sh https://staging.familytv.vercel.app

  # Gate 6: Test Gate (unit + E2E tests - MUST PASS to deploy)
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Run unit tests
        run: npm run test
      - name: Run Playwright E2E tests
        run: npx playwright test

  # Merge gate: all must pass
  deploy-ready:
    needs: [code-quality, coverage, security, design-review, smoke-test, tests]
    runs-on: ubuntu-latest
    steps:
      - name: All gates passed
        run: |
          echo "✅ All deploy gates passed"
          echo "PR is ready for merge by release-manager"
